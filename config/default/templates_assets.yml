templates:
  asset_root: "{project_root}/assets/{category}/{group}/{asset_name}"

  # main areas
  dept_work: "{asset_root}/work"
  dept_data: "{asset_root}/data"
  dept_publish: "{asset_root}/publish"
  dept_reference: "{asset_root}/reference"

  # work is DCC-first and keeps take numbers in file names.
  work_scene_dir: "{asset_root}/work/{dcc}/{department}/{variant}"
  work_scene_file: "{project_name}_{asset_name}_{department}_{variant}_{version}_{take}.{ext}"
  publish_scene_file: "{asset_name}_{variant}_{version}.{ext}"
  work_maya_model_hires: "{dept_work}/maya/model/hires"
  work_maya_model_proxy: "{dept_work}/maya/model/proxy"
  work_maya_model_render: "{dept_work}/maya/model/render"
  work_maya_rig_layout: "{dept_work}/maya/rig/layout"
  work_maya_rig_anim: "{dept_work}/maya/rig/anim"
  work_maya_groom: "{dept_work}/maya/groom"
  work_substance: "{dept_work}/substance"
  work_mari: "{dept_work}/mari"
  work_zbrush: "{dept_work}/zbrush"
  work_houdini: "{dept_work}/houdini"

  # data stores reusable build/cache inputs.
  data_rig_skin: "{dept_data}/rig/skin"
  data_rig_guide: "{dept_data}/rig/guide"
  data_rig_build: "{dept_data}/rig/build"
  data_groom: "{dept_data}/groom"
  data_sim: "{dept_data}/sim"

  # publish is versioned and take-less.
  publish_model_hires_ma: "{dept_publish}/model/hires/ma"
  publish_model_hires_fbx: "{dept_publish}/model/hires/fbx"
  publish_model_hires_abc: "{dept_publish}/model/hires/abc"
  publish_model_hires_usd: "{dept_publish}/model/hires/usd"
  publish_rig_layout: "{dept_publish}/rig/layout"
  publish_rig_anim: "{dept_publish}/rig/anim"
  publish_groom: "{dept_publish}/groom"
  publish_surfacing: "{dept_publish}/surfacing"
  publish_texture: "{dept_publish}/texture"
  publish_usd: "{dept_publish}/usd"

  reference_concept: "{dept_reference}/concept"
  reference_scan: "{dept_reference}/scan"
  reference_photo: "{dept_reference}/photo"
