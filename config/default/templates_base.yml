anchors:
  project_name: "PROJECTCODE"
  project_root: "D:/Projects/PROJECTCODE"
  fps: 24
  resolution: [1920, 1080]

# Shot用の部署リスト
shot_depts:
  - layout
  - anim
  - fx
  - light
  - comp

# Asset用の部署リスト
asset_depts:
  - model
  - rig
  - look

templates:
  # プロジェクト直下の主要フォルダ
  atr_root: "{project_root}/atr"
  assets_root: "{project_root}/assets"
  editorial_root: "{project_root}/editorial"
  prepro_root: "{project_root}/prepro"
  sequences_root: "{project_root}/sequences"
  shots_root: "{project_root}/shots"
  setting_root: "{project_root}/settings"
  delivery_root: "{project_root}/delivery"
  library_root: "{project_root}/library"

  # さらにその下の階層も必要なら追加
  tool_dir: "{setting_root}/tools"
  storyboard_dir: "{prepro_root}/storyboards"
  reference_dir: "{prepro_root}/reference"