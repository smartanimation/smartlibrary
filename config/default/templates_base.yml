anchors:
  project_name: "PROJECTCODE"
  project_root: "D:/Projects/PROJECTCODE"
  fps: 24
  resolution: [1920, 1080]

# Shot用の部署リスト
shot_depts:
  - layout
  - anim
  - fx
  - light
  - comp

# Asset用の部署リスト
asset_depts:
  - model
  - rig
  - look

#softwares:
